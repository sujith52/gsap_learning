<h1 class="main">G Sujith Kumar</h1>
<h1 class="split">
    <span>S</span>
    <span>U</span>
    <span>J</span>
    <span>I</span>
    <span>T</span>

<svg width="600" height="300" viewBox ="0 0 200 100">
  <path d="M10 100 Q 100 10 190 100" stroke="green" fill="transparent"/>
</svg>

<style>
body{
    align-items: center;
    justify-content: center;
    display: flex;
    flex-direction: column;
}
.main{
color: gray;
}
.split{
    display: flex;
    gap: 10px;
    background-color: grey;
    padding: 10px;
}
</style>

gsap.from("h1 span",{y : 50, opacity : 0, duration : 3, ease : "power2.out", stagger : 0.1, scale : 1.1})
gsap.from ("path",{strokeDasharray : 400, strokeDashoffset : 300, duration: 5})
