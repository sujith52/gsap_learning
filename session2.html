<!DOCTYPE html>
<html>
<head>
  <title>GSAP Start learning gsap from to, from </title>
  
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<button onclick="add()">Click me man</button>
<div class="box"><h1>Sujith</h1></div>
<div class="bbox"><h1>Kumar</h1></div>
<style>
    .box, .bbox{
        width: 200px;
        height: 200px;
        background: orange;
        border-radius: 50%;
        border: 2px solid black;
        align-items: center;
        justify-content: center;
        display: flex;
        font-family: monospace;
    }
</style>
<script>
    // gsap.from(".box",{x : -600, duration : 5, ease:"bounce.out", opacity : 0 })
    // gsap.fromTo(".box", {x : 100, }, {x: 200, duration : 4, ease: "bounce.out"})
function add(){
    gsap.from(".box",{x : -600,  opacity : 0, duration : 2, ease: "bounce.out"})
    gsap.fromTo(".bbox",{y:-200, duration : 2}, {x:200, ease: "bounce.out", duration : 3})
}
</script>
</body>
</html>
