<!DOCTYPE html>
<html>
<head>
  <title>GSAP pins and the basic scorlls and the animations at 07:56pm </title>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

<div class="section red"><h1>Sujith</h1></div>
<div class="section blue"><h1>Kumar</h1></div>
<div class="section grey"><h1>Kumar</h1></div>
<style>
div{
    align-items: center;
    justify-content: center;
    display: flex;
}
.section {
  height: 100vh;
}
.red { background: red; }
.blue { background: blue; }
.grey{ background: gray;}
</style>

<script>
gsap.registerPlugin(ScrollTrigger);

gsap.to(".red",{x : 200, ease: "power2.out", duration : 5, scrollTrigger : {
    trigger: ".red",
    pin : true,
    start : "top top",
    end : "+=500",
    scrub : true
}})

gsap.to(".blue",{ease: "smooth.out", duration : 6,rotation : 180, scrollTrigger : {
    trigger: ".blue",
    pin : true,
    start: "top top",
    end : "+=500",
    scrub : true
}})

gsap.to(".grey", {ease: "smooth.out", duration : 8, scale : 1.5, scrollTrigger : {
    trigger : ".grey",
    start : "top top",
    end : "+=50",
    scrub : true,
    pin : true
}})
// well i hope consistency will achive the great sucess bro !
</script>

</body>
</html>
