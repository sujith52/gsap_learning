<!DOCTYPE html>
<html>
<head>
  <title>GSAP scroll trigger learning at 07:37pm at 18-04-2026</title>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

<div style="height: 100vh;"></div>

<div class="box"></div>
<div class="box2"></div>

<div style="height: 100vh;"></div>
<style>
  .box, .box2{
    margin-top: 20px;
    width: 100px;
    height: 100px;
    background: red;
  }
</style>
<script>
// gsap.registerPlugin(ScrollTrigger)
// gsap.to(".box",{x : 200, ease: "power2.out",duration : 4, scrollTrigger : {
//   trigger : ".box", 
//   start : "top 80%",
//   end : "top 30%", scrub : true
// } })
// gsap.to(".box2",{x:400, ease: "power2.out", duration : 6,scale : 2.0,
//   rotation : 360, scrollTrigger: {
//   trigger: ".box2",
//   start : "top 60%",
//   end : "top 10%",
//   scrub : true
  
// }})

gsap.registerPlugin(ScrollTrigger);

gsap.to(".box", {
  x: 200,
  ease: "power2.out",
  scrollTrigger: {
    trigger: ".box",
    start: "top 80%",
    end: "top 30%",
    scrub: true
  }
});

gsap.to(".box2", {
  x: 400,
  scale: 2,
  rotation: 360,
  ease: "power2.out",
  scrollTrigger: {
    trigger: ".box2",
    start: "top 60%",
    end: "top 10%",
    scrub: true,
    markers: true
  }
});
</script>

</body>
</html>
